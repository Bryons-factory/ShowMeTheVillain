name: Deploy ShowMeTheVillain

on:
  push:
    branches:
      - main
      - frontend-workers-setup # Added so it triggers on your current PR branch!
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write # Explicit permission needed for Cloudflare Pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy Heatmap Frontend (Pages)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Force the "Pages" command to look inside the frontend folder
          command: pages deploy ./frontend --project-name=showmethevillain

      - name: Deploy Villain Data API (Worker)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # This deploys the actual backend logic
          command: deploy ./frontend/entry.py --name showmethevillain
