name: Deploy ShowMeTheVillain

on:
  push:
    branches:
      - main
      - frontend-workers-setup
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js (ensure npm available)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler Globally
        run: npm install -g wrangler@4.71.0

      - name: Deploy Heatmap Frontend (Pages)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages deploy ./frontend --project-name=showmethevillian

      - name: Deploy Villain Data API (Worker)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler deploy --compatibility-flags=python_workers --compatibility-date=2026-03-06 --name showmethevillain ./frontend/entry.py