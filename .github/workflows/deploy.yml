name: Deploy ShowMeTheVillain

on:
  push:
    branches:
      - main
      - frontend-workers-setup # Added so it triggers on your current PR branch!
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write # Explicit permission needed for Cloudflare Pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy Heatmap Frontend (Pages)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # The typo match! This will now successfully find your Pages project
          command: pages deploy ./frontend --project-name=showmethevillian

      - name: Deploy Villain Data API (Worker)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # IMPORTANT: Make sure this points to wherever your entry.py file lives!
          # If it is in the main folder, use ./entry.py
          command: deploy ./entry.py --name showmethevillain --compatibility-date=2026-03-06 --compatibility-flags=python_workers 