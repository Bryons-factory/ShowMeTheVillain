name: Deploy ShowMeTheVillain

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Deploy the Worker API
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy ./villain-api/src/entry.py --name villain-api

      # 2. Build & Deploy the Frontend
      - name: Deploy Frontend
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Points specifically to your frontend folder
          command: pages deploy ./frontend --project-name=showmethevillain