<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- api-base: FastAPI origin (no trailing slash) OR Worker URL for data-source=worker.
         GitHub Actions rewrites these for Cloudflare Pages after Worker deploy (see .github/workflows/deploy.yml).
         In production over HTTPS, api-base must be HTTPS (never http://127.0.0.1) to avoid mixed-content blocking. -->
    <meta name="api-base" content="http://127.0.0.1:8000">
    <!-- data-source: "api" -> GET {api-base}/api/phishing/map-points ; "worker" -> Worker root (see worker-map-query) -->
    <meta name="data-source" content="api">
    <!-- worker-map-query: path+query for Worker map JSON. Default uses D1 grid (bounded reads). Raw points: content="/?limit=2000" or "/?limit=all" -->
    <meta name="worker-map-query" content="/?mode=grid&amp;limit=5000">
    <title>ShowMeTheVillain Tracker</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; font-family: system-ui, Segoe UI, Arial, sans-serif; }
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            min-height: 0;
        }
        .filter-bar {
            flex: 0 0 auto;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px 16px;
            padding: 10px 14px;
            background: #1a1d23;
            color: #e8eaed;
            border-bottom: 1px solid #333;
            z-index: 10;
        }
        .filter-bar label {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #9aa0a6;
        }
        .filter-bar select {
            min-width: 140px;
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #2d3139;
            color: #e8eaed;
            font-size: 14px;
        }
        .filter-bar select:focus {
            outline: 2px solid #5c9ce6;
            outline-offset: 1px;
        }
        .filter-bar-right {
            margin-left: auto;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px 14px;
            max-width: 100%;
        }
        #status {
            font-size: 13px;
            color: #bdc1c6;
            max-width: min(100%, 28rem);
        }
        #status.error { color: #f28b82; }
        .toolbar-about-btn {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 7px 14px;
            border-radius: 6px;
            border: 1px solid #5c9ce6;
            background: #2d3139;
            color: #e8eaed;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            white-space: nowrap;
        }
        .toolbar-about-btn:hover {
            background: #3c4250;
            color: #fff;
        }
        .toolbar-about-btn:focus {
            outline: 2px solid #5c9ce6;
            outline-offset: 2px;
        }
        .map-wrap {
            flex: 1;
            min-height: 0;
            position: relative;
        }
        #villain-map {
            width: 100%;
            height: 100%;
        }
        #empty-overlay {
            display: none;
            position: absolute;
            inset: 0;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            font-size: 16px;
            color: #5f6368;
            background: rgba(255,255,255,0.85);
        }
        #empty-overlay.visible { display: flex; }
    </style>
</head>
<body>
    <div class="app">
        <header class="filter-bar" role="toolbar" aria-label="Map filters">
            <label for="filter-threat">Threat
                <select id="filter-threat" aria-label="Filter by threat level"></select>
            </label>
            <label for="filter-company">Target
                <select id="filter-company" aria-label="Filter by target company"></select>
            </label>
            <label for="filter-country">Country
                <select id="filter-country" aria-label="Filter by country"></select>
            </label>
            <label for="filter-isp">ISP
                <select id="filter-isp" aria-label="Filter by ISP"></select>
            </label>
            <div class="filter-bar-right">
                <div id="status" role="status">Loading threat data…</div>
                <a href="about.html" class="toolbar-about-btn">About the project</a>
            </div>
        </header>
        <div class="map-wrap">
            <div id="villain-map" aria-label="Threat density map"></div>
            <div id="empty-overlay" aria-live="polite">No threats match the selected filters.</div>
        </div>
    </div>

    <script>
        (function () {
            const MAP_ID = 'villain-map';
            const PLOTLY_CONFIG = { responsive: true, displaylogo: false };
            const statusEl = document.getElementById('status');
            const emptyOverlay = document.getElementById('empty-overlay');

            function metaContent(name, fallback) {
                const el = document.querySelector('meta[name="' + name + '"]');
                return (el && el.content && el.content.trim()) ? el.content.trim() : fallback;
            }

            function getApiBase() {
                if (typeof window.__API_BASE__ === 'string' && window.__API_BASE__.trim()) {
                    return window.__API_BASE__.trim().replace(/\/$/, '');
                }
                return metaContent('api-base', 'http://127.0.0.1:8000').replace(/\/$/, '');
            }

            function getDataSource() {
                return metaContent('data-source', 'api').toLowerCase();
            }

            function buildDataUrl() {
                const base = getApiBase();
                if (getDataSource() === 'worker') {
                    var q = metaContent('worker-map-query', '/?mode=grid&limit=5000');
                    if (q.charAt(0) !== '/') q = '/' + q;
                    return base + q;
                }
                return base + '/api/phishing/map-points?limit=800';
            }

            function uniqSorted(values) {
                return Array.from(new Set(values.filter(Boolean))).sort(function (a, b) {
                    return String(a).localeCompare(String(b));
                });
            }

            function fillSelect(id, values, allLabel) {
                const sel = document.getElementById(id);
                sel.innerHTML = '';
                const optAll = document.createElement('option');
                optAll.value = 'all';
                optAll.textContent = allLabel;
                sel.appendChild(optAll);
                values.forEach(function (v) {
                    const o = document.createElement('option');
                    o.value = v;
                    o.textContent = v;
                    sel.appendChild(o);
                });
            }

            function displayCompany(row) {
                return row.company || 'Unknown';
            }
            function displayCountry(row) {
                return row.country || 'Unknown';
            }
            function displayIsp(row) {
                return row.isp || 'Unknown';
            }

            function buildFilterOptions(rows) {
                fillSelect('filter-threat', uniqSorted(rows.map(function (r) { return r.threat_level; })), 'All levels');
                fillSelect('filter-company', uniqSorted(rows.map(displayCompany)), 'All targets');
                fillSelect('filter-country', uniqSorted(rows.map(displayCountry)), 'All countries');
                fillSelect('filter-isp', uniqSorted(rows.map(displayIsp)), 'All ISPs');
            }

            function readFilters() {
                return {
                    threat: document.getElementById('filter-threat').value,
                    company: document.getElementById('filter-company').value,
                    country: document.getElementById('filter-country').value,
                    isp: document.getElementById('filter-isp').value
                };
            }

            function applyFilters(rows, f) {
                return rows.filter(function (r) {
                    if (f.threat !== 'all' && r.threat_level !== f.threat) return false;
                    if (f.company !== 'all' && displayCompany(r) !== f.company) return false;
                    if (f.country !== 'all' && displayCountry(r) !== f.country) return false;
                    if (f.isp !== 'all' && displayIsp(r) !== f.isp) return false;
                    return true;
                });
            }

            function rowsToPlotData(rows) {
                return [{
                    type: 'densitymapbox',
                    lat: rows.map(function (r) { return r.lat; }),
                    lon: rows.map(function (r) { return r.lon; }),
                    z: rows.map(function (r) { return r.intensity; }),
                    hovertext: rows.map(function (r) { return r.name; }),
                    hoverinfo: 'text',
                    radius: 20
                }];
            }

            function defaultCenter(rows) {
                if (!rows.length) return { lat: 20, lon: 0, zoom: 2 };
                var sumLat = 0, sumLon = 0;
                rows.forEach(function (r) { sumLat += r.lat; sumLon += r.lon; });
                return {
                    lat: sumLat / rows.length,
                    lon: sumLon / rows.length,
                    zoom: rows.length === 1 ? 10 : 4
                };
            }

            var plotInitialized = false;

            function updateMap(allRows) {
                var f = readFilters();
                var filtered = applyFilters(allRows, f);
                var total = allRows.length;
                var n = filtered.length;

                emptyOverlay.classList.toggle('visible', n === 0);

                statusEl.classList.remove('error');
                statusEl.textContent = n === total
                    ? 'Tracking ' + total + ' active threats (all shown)'
                    : 'Tracking ' + total + ' active threats (' + n + ' shown)';

                var c = defaultCenter(filtered.length ? filtered : allRows);
                var layout = {
                    mapbox: {
                        style: 'open-street-map',
                        center: { lat: c.lat, lon: c.lon },
                        zoom: c.zoom
                    },
                    margin: { l: 0, r: 0, t: 0, b: 0 }
                };

                if (plotInitialized && document.getElementById(MAP_ID) && document.getElementById(MAP_ID).layout) {
                    var L = document.getElementById(MAP_ID).layout;
                    if (L && L.mapbox) {
                        layout.mapbox.center = L.mapbox.center;
                        layout.mapbox.zoom = L.mapbox.zoom;
                    }
                }

                var plotData;
                if (n === 0) {
                    plotData = [{
                        type: 'scattermapbox',
                        lat: [],
                        lon: [],
                        mode: 'markers',
                        marker: { size: 8 }
                    }];
                } else {
                    plotData = rowsToPlotData(filtered);
                }

                if (!plotInitialized) {
                    Plotly.newPlot(MAP_ID, plotData, layout, PLOTLY_CONFIG);
                    plotInitialized = true;
                } else {
                    Plotly.react(MAP_ID, plotData, layout, PLOTLY_CONFIG);
                }
            }

            function wireFilters(allRows) {
                ['filter-threat', 'filter-company', 'filter-country', 'filter-isp'].forEach(function (id) {
                    document.getElementById(id).addEventListener('change', function () {
                        updateMap(allRows);
                    });
                });
            }

            var dataUrl = buildDataUrl();
            if (/\.pages\.dev$/i.test(window.location.hostname)) {
                var _b = getApiBase();
                if (/^http:\/\/(127\.0\.0\.1|localhost)\b/i.test(_b) && getDataSource() === 'api') {
                    statusEl.classList.add('error');
                    statusEl.textContent =
                        'Pages build still targets localhost. Deploy with GitHub Actions (patches Worker URL) or set meta api-base to your HTTPS Worker URL and data-source to worker.';
                    return;
                }
            }
            fetch(dataUrl)
                .then(function (response) {
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return response.json();
                })
                .then(function (data) {
                    if (!Array.isArray(data)) throw new Error('Expected JSON array');
                    var allRows = data;
                    buildFilterOptions(allRows);
                    wireFilters(allRows);
                    updateMap(allRows);
                })
                .catch(function (error) {
                    statusEl.classList.add('error');
                    var msg = (error && error.message) ? error.message : 'Request failed';
                    statusEl.textContent = 'Could not load threat data: ' + msg + '. Check api-base / data-source meta and that the API is running.';
                    console.error('Threat data URL:', dataUrl, error);
                });
        })();
    </script>
</body>
</html>
